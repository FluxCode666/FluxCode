# =============================================================================
# Sub2API Frontend Nginx Configuration (Cluster Mode)
# =============================================================================
# This config serves the Vue 3 frontend as static files and reverse-proxies
# all API requests to the backend upstream cluster.
#
# Usage:
#   - Edit the 'upstream backend' block to list your backend instances
#   - Place SSL certificates on each nginx machine:
#       /etc/nginx/certs/test.flux-code.cc/fullchain.pem
#       /etc/nginx/certs/test.flux-code.cc/privkey.pem
#       /etc/nginx/certs/test.flux-code.cc/chain.pem
#   - Test config: sudo nginx -t
#   - Reload: sudo systemctl reload nginx
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # =========================================================================
    # IMPORTANT: Allow headers with underscores (e.g. session_id)
    # Nginx drops such headers by default, breaking sticky session routing
    # for Sora multi-account scenarios.
    # =========================================================================
    underscores_in_headers on;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Max request body size (align with backend GATEWAY_MAX_BODY_SIZE)
    client_max_body_size 256m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        application/wasm;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'trace=$trace_id rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # =========================================================================
    # Trace ID: use client-provided X-Trace-ID if present, else auto-generate
    # =========================================================================
    map $http_x_trace_id $trace_id {
        default $http_x_trace_id;
        ''      $request_id;
    }

    # =========================================================================
    # WebSocket upgrade mapping
    # =========================================================================
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # =========================================================================
    # Backend upstream cluster
    # =========================================================================
    # Add or remove backend instances as needed.
    # For Docker Compose cluster mode, use container service names.
    # For multi-machine deployment, use actual IP:PORT addresses.
    #
    # Load balancing strategies:
    #   (default)   round_robin - evenly distribute requests
    #   ip_hash     - sticky sessions based on client IP
    #   least_conn  - send to least busy backend
    # =========================================================================
    upstream backend {
        # Default: single backend instance (Docker Compose service name)
        server 127.0.0.1:8080;

        # Uncomment to add more backend instances:
        # server backend-2:8080;
        # server backend-3:8080;

        # Multi-machine deployment examples:
        # server 10.0.1.10:8080;
        # server 10.0.1.11:8080;
        # server 10.0.1.12:8080;

        # Connection pool to backends
        keepalive 64;
        keepalive_timeout 120s;
    }

    # =========================================================================
    # HTTP server — redirect to HTTPS + serve certbot challenge
    # =========================================================================
    server {
        listen 80 default_server;
        server_name test.flux-code.cc;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS server — main site
    # =========================================================================
    server {
        listen 443 ssl http2 default_server;
        server_name test.flux-code.cc;

        # =================================================================
        # SSL certificate (manually placed on each nginx machine)
        # =================================================================
        ssl_certificate     /etc/nginx/certs/test.flux-code.cc/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/test.flux-code.cc/privkey.pem;

        # =================================================================
        # SSL hardening
        # =================================================================
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # OCSP stapling (disabled — Let's Encrypt ISRG Root X1 certs may lack
        # OCSP responder URL, causing nginx warnings. Re-enable if your cert
        # includes an OCSP responder.)
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # ssl_trusted_certificate /etc/nginx/certs/test.flux-code.cc/chain.pem;
        resolver 8.8.8.8 1.1.1.1 valid=300s;
        resolver_timeout 5s;

        # SSL session cache
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # =================================================================
        # Security headers
        # =================================================================
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # =================================================================
        # Full-chain Trace ID — returned to client in every response
        # =================================================================
        add_header X-Trace-ID $trace_id always;

        # =================================================================
        # Common proxy settings (reused via include or repeated)
        # =================================================================

        # -----------------------------------------------------------------
        # API routes → reverse proxy to backend cluster
        # -----------------------------------------------------------------

        # /api/ - Main REST API (includes admin WebSocket at /api/v1/admin/ops/ws/)
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Trace-ID $trace_id;

            # WebSocket support (for /api/v1/admin/ops/ws/qps)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # SSE / streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # /v1/ - OpenAI-compatible gateway API
        location /v1/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Trace-ID $trace_id;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # SSE / streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # /v1beta/ - Gemini native API
        location /v1beta/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Trace-ID $trace_id;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # /responses - OpenAI Responses API (WebSocket + HTTP)
        location /responses {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Trace-ID $trace_id;

            # WebSocket upgrade support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;
            proxy_cache off;
            # Long-lived WebSocket connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # /chat/completions - OpenAI Chat Completions (alias without /v1 prefix)
        location /chat/completions {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Trace-ID $trace_id;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # /sora/ - Sora client routes
        location /sora/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Trace-ID $trace_id;
            # session_id header is passed through via underscores_in_headers on

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # /antigravity/ - Antigravity routes
        location /antigravity/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Trace-ID $trace_id;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # /setup/ - Initial setup wizard
        location /setup/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Trace-ID $trace_id;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # /health - Health check endpoint
        location = /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Trace-ID $trace_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # -----------------------------------------------------------------
        # Static files → served directly by Nginx
        # -----------------------------------------------------------------

        # Hashed assets (Vite build output) — permanent cache
        location /assets/ {
            root /var/www/html;
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Other static files (favicon, logo, etc.)
        location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|map)$ {
            root /var/www/html;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            try_files $uri =404;
        }

        # -----------------------------------------------------------------
        # SPA fallback — all other routes serve index.html
        # -----------------------------------------------------------------
        location / {
            root /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # index.html must not be cached (to pick up new deployments)
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
                add_header Expires "0";
            }
        }
    }
}
