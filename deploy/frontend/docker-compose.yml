# =============================================================================
# Sub2API - Frontend Deployment (Multi-Machine)
# =============================================================================
# Deploy this on the FRONTEND / LOAD BALANCER machine.
# Serves Vue 3 static files via Nginx and reverse-proxies API requests
# to backend instances on other machines.
#
# Usage:
#   1. cp .env.example .env
#   2. Edit .env: set BACKEND_SERVERS to your backend IPs
#   3. docker compose up -d
# =============================================================================

services:
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/fluxcode666/fluxcode-frontend}:${FRONTEND_TAG:-latest}
    # Or build from source (run from project root):
    # build:
    #   context: ../../
    #   dockerfile: deploy/frontend/Dockerfile
    container_name: fluxcode-frontend
    restart: unless-stopped
    ports:
      - "${BIND_HOST:-0.0.0.0}:${FRONTEND_PORT:-80}:80"
      # Uncomment for HTTPS (mount certs via volumes):
      # - "${BIND_HOST:-0.0.0.0}:443:443"
    environment:
      # Comma-separated list of backend server addresses
      # Example: "10.0.1.10:8080,10.0.1.11:8080,10.0.1.12:8080"
      - BACKEND_SERVERS=${BACKEND_SERVERS:?BACKEND_SERVERS is required}
    volumes:
      # Optional: mount custom nginx.conf to fully override (bypasses template)
      # - ./custom-nginx.conf:/etc/nginx/nginx.conf:ro

      # Optional: mount TLS certificates for HTTPS
      # - ./ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      # - ./ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      []
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "3", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
