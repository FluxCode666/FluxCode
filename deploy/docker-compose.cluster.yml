# =============================================================================
# Sub2API Docker Compose - Cluster Configuration
# =============================================================================
# Frontend/backend separated deployment with load balancing support.
#
# Architecture:
#   Nginx (frontend) → Backend-1, Backend-2, ... → PostgreSQL + Redis
#
# Quick Start (single machine):
#   1. cp .env.cluster.example .env
#   2. Edit .env: set passwords, JWT_SECRET, etc.
#   3. docker compose -f docker-compose.cluster.yml up -d
#   4. Access: http://localhost (or $FRONTEND_PORT)
#
# Multi-machine deployment:
#   See README_CLUSTER.md for detailed instructions.
# =============================================================================

services:
  # ===========================================================================
  # Frontend (Nginx + Vue 3 SPA)
  # ===========================================================================
  # Serves static files and reverse-proxies API requests to backend cluster.
  # Edit deploy/frontend/nginx.conf to add more backend instances.
  # ===========================================================================
  frontend:
    build:
      context: ../
      dockerfile: deploy/frontend/Dockerfile
    image: fluxcode-frontend:latest
    container_name: fluxcode-frontend
    restart: unless-stopped
    ports:
      - "${BIND_HOST:-0.0.0.0}:${FRONTEND_PORT:-80}:80"
    volumes:
      # Optional: mount custom nginx.conf to modify upstream backends
      # - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      []
    depends_on:
      backend-1:
        condition: service_healthy
    networks:
      - sub2api-cluster
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "3", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ===========================================================================
  # Backend Instance 1 (API only, no frontend)
  # ===========================================================================
  backend-1:
    build:
      context: ../
      dockerfile: deploy/backend/Dockerfile
    image: fluxcode-backend:latest
    container_name: fluxcode-backend-1
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    # NOTE: Backend ports are NOT exposed to the host.
    # All traffic goes through the Nginx frontend.
    # For debugging, uncomment: ports: ["127.0.0.1:8081:8080"]
    volumes:
      - backend1_data:/app/data
    environment:
      # =======================================================================
      # Auto Setup (creates admin account and DB schema on first run)
      # =======================================================================
      - AUTO_SETUP=true

      # =======================================================================
      # Server Configuration
      # =======================================================================
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=${SERVER_MODE:-release}
      - RUN_MODE=${RUN_MODE:-standard}

      # =======================================================================
      # Database Configuration (shared PostgreSQL)
      # =======================================================================
      - DATABASE_HOST=${DATABASE_HOST:-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER:-sub2api}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      - DATABASE_DBNAME=${DATABASE_DBNAME:-sub2api}
      - DATABASE_SSLMODE=${DATABASE_SSLMODE:-disable}
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-50}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-10}
      - DATABASE_CONN_MAX_LIFETIME_MINUTES=${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}
      - DATABASE_CONN_MAX_IDLE_TIME_MINUTES=${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}

      # =======================================================================
      # Redis Configuration (shared Redis)
      # =======================================================================
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-1024}
      - REDIS_MIN_IDLE_CONNS=${REDIS_MIN_IDLE_CONNS:-10}
      - REDIS_ENABLE_TLS=${REDIS_ENABLE_TLS:-false}

      # =======================================================================
      # Admin Account (auto-created on first run)
      # =======================================================================
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@sub2api.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}

      # =======================================================================
      # JWT Configuration
      # CRITICAL: Must be the same across ALL backend instances!
      # =======================================================================
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required for cluster mode}
      - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}

      # =======================================================================
      # TOTP (2FA) Configuration
      # CRITICAL: Must be the same across ALL backend instances!
      # =======================================================================
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:-}

      # =======================================================================
      # Timezone Configuration
      # =======================================================================
      - TZ=${TZ:-Asia/Shanghai}

      # =======================================================================
      # Gemini OAuth Configuration (optional)
      # =======================================================================
      - GEMINI_OAUTH_CLIENT_ID=${GEMINI_OAUTH_CLIENT_ID:-}
      - GEMINI_OAUTH_CLIENT_SECRET=${GEMINI_OAUTH_CLIENT_SECRET:-}
      - GEMINI_OAUTH_SCOPES=${GEMINI_OAUTH_SCOPES:-}
      - GEMINI_QUOTA_POLICY=${GEMINI_QUOTA_POLICY:-}

      # Built-in OAuth client secrets (optional)
      - GEMINI_CLI_OAUTH_CLIENT_SECRET=${GEMINI_CLI_OAUTH_CLIENT_SECRET:-}
      - ANTIGRAVITY_OAUTH_CLIENT_SECRET=${ANTIGRAVITY_OAUTH_CLIENT_SECRET:-}

      # =======================================================================
      # Security Configuration
      # =======================================================================
      - SECURITY_URL_ALLOWLIST_ENABLED=${SECURITY_URL_ALLOWLIST_ENABLED:-false}
      - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=${SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-false}
      - SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS=${SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-false}
      - SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS=${SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS:-}

      # =======================================================================
      # Update Configuration
      # =======================================================================
      - UPDATE_PROXY_URL=${UPDATE_PROXY_URL:-}
    networks:
      - sub2api-cluster
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # Backend Instance 2 (optional - uncomment to enable)
  # ===========================================================================
  # IMPORTANT: When adding more instances, also update the upstream block
  # in deploy/frontend/nginx.conf to include the new backend.
  # ===========================================================================
  # backend-2:
  #   image: fluxcode-backend:latest
  #   container_name: fluxcode-backend-2
  #   restart: unless-stopped
  #   ulimits:
  #     nofile:
  #       soft: 100000
  #       hard: 100000
  #   volumes:
  #     - backend2_data:/app/data
  #   environment:
  #     - AUTO_SETUP=true
  #     - SERVER_HOST=0.0.0.0
  #     - SERVER_PORT=8080
  #     - SERVER_MODE=${SERVER_MODE:-release}
  #     - RUN_MODE=${RUN_MODE:-standard}
  #     - DATABASE_HOST=${DATABASE_HOST:-postgres}
  #     - DATABASE_PORT=${DATABASE_PORT:-5432}
  #     - DATABASE_USER=${DATABASE_USER:-sub2api}
  #     - DATABASE_PASSWORD=${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
  #     - DATABASE_DBNAME=${DATABASE_DBNAME:-sub2api}
  #     - DATABASE_SSLMODE=${DATABASE_SSLMODE:-disable}
  #     - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-50}
  #     - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-10}
  #     - DATABASE_CONN_MAX_LIFETIME_MINUTES=${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}
  #     - DATABASE_CONN_MAX_IDLE_TIME_MINUTES=${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}
  #     - REDIS_HOST=${REDIS_HOST:-redis}
  #     - REDIS_PORT=${REDIS_PORT:-6379}
  #     - REDIS_PASSWORD=${REDIS_PASSWORD:-}
  #     - REDIS_DB=${REDIS_DB:-0}
  #     - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-1024}
  #     - REDIS_MIN_IDLE_CONNS=${REDIS_MIN_IDLE_CONNS:-10}
  #     - REDIS_ENABLE_TLS=${REDIS_ENABLE_TLS:-false}
  #     - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@sub2api.local}
  #     - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
  #     - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required for cluster mode}
  #     - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}
  #     - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:-}
  #     - TZ=${TZ:-Asia/Shanghai}
  #     - GEMINI_OAUTH_CLIENT_ID=${GEMINI_OAUTH_CLIENT_ID:-}
  #     - GEMINI_OAUTH_CLIENT_SECRET=${GEMINI_OAUTH_CLIENT_SECRET:-}
  #     - GEMINI_OAUTH_SCOPES=${GEMINI_OAUTH_SCOPES:-}
  #     - GEMINI_QUOTA_POLICY=${GEMINI_QUOTA_POLICY:-}
  #     - GEMINI_CLI_OAUTH_CLIENT_SECRET=${GEMINI_CLI_OAUTH_CLIENT_SECRET:-}
  #     - ANTIGRAVITY_OAUTH_CLIENT_SECRET=${ANTIGRAVITY_OAUTH_CLIENT_SECRET:-}
  #     - SECURITY_URL_ALLOWLIST_ENABLED=${SECURITY_URL_ALLOWLIST_ENABLED:-false}
  #     - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=${SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-false}
  #     - SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS=${SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-false}
  #     - SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS=${SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS:-}
  #     - UPDATE_PROXY_URL=${UPDATE_PROXY_URL:-}
  #   networks:
  #     - sub2api-cluster
  #   healthcheck:
  #     test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 30s

  # ===========================================================================
  # PostgreSQL Database (optional - comment out if using external DB)
  # ===========================================================================
  postgres:
    image: postgres:18-alpine
    container_name: fluxcode-cluster-postgres
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=${DATABASE_USER:-sub2api}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      - POSTGRES_DB=${DATABASE_DBNAME:-sub2api}
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - sub2api-cluster
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-sub2api} -d ${DATABASE_DBNAME:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # NOTE: Port not exposed to host. Accessed via internal network only.
    # For debugging, uncomment: ports: ["127.0.0.1:5433:5432"]

  # ===========================================================================
  # Redis Cache (optional - comment out if using external Redis)
  # ===========================================================================
  redis:
    image: redis:8-alpine
    container_name: fluxcode-cluster-redis
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - redis_data:/data
    command: >
        sh -c '
          redis-server
          --save 60 1
          --appendonly yes
          --appendfsync everysec
          ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - REDISCLI_AUTH=${REDIS_PASSWORD:-}
    networks:
      - sub2api-cluster
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

# =============================================================================
# Volumes
# =============================================================================
volumes:
  backend1_data:
    driver: local
  # backend2_data:
  #   driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  sub2api-cluster:
    driver: bridge
