# =============================================================================
# Sub2API - Frontend Docker Image Build Pipeline
# =============================================================================
# Builds the Vue 3 + Nginx frontend Docker image (multi-arch) and pushes
# to GHCR. Does NOT deploy — for Docker-based frontend deployments,
# pull the image manually or use docker-compose.
#
# Triggers:
#   - Manual workflow_dispatch only (select main branch, input version)
#
# Required secrets:
#   GITHUB_TOKEN (auto-provided) for GHCR push
#
# No additional secrets required.
# =============================================================================

name: Build Frontend Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ghcr_image: ${{ steps.meta.outputs.ghcr_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image metadata
        id: meta
        run: |
          TAG="${{ github.event.inputs.version }}"
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT

          OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "ghcr_image=ghcr.io/${OWNER_LOWER}/sub2api-frontend" >> $GITHUB_OUTPUT

          echo "Image tag: ${TAG}"

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/frontend/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ steps.meta.outputs.ghcr_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.ghcr_image }}:latest
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image

      - name: Build summary
        run: |
          echo "## Frontend Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ steps.meta.outputs.ghcr_image }}:${{ steps.meta.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: \`${{ env.PLATFORMS }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${GITHUB_SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
