# =============================================================================
# Sub2API - Test Backend Deployment Pipeline
# =============================================================================
# Builds the Go backend Docker image (no frontend) and deploys to
# test backend servers via SSH.
#
# Mirrors deploy-backend.yml but targets the test environment.
#
# Triggers:
#   - Push to test branch with backend or deploy/backend changes
#   - Manual workflow_dispatch
#
# Required secrets (in test-backend environment):
#   TEST_BACKEND_DEPLOY_HOSTS     - Comma-separated test backend server IPs
#   TEST_BACKEND_DEPLOY_USER      - SSH user (default: root)
#   TEST_BACKEND_DEPLOY_PASSWORD  - SSH password for test backend servers
#
# Optional secrets:
#   TEST_BACKEND_DEPLOY_PORT      - SSH port (default: 22)
#   TEST_BACKEND_DEPLOY_PATH      - docker-compose dir (default: /opt/sub2api/backend)
# =============================================================================

name: Deploy Test Backend

on:
  push:
    branches: [test]
    paths:
      - 'backend/**'
      - 'deploy/backend/**'
      - 'deploy/docker-entrypoint.sh'
      - '.github/workflows/deploy-test-backend.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: test-{sha7})'
        required: false
        type: string
      skip_deploy:
        description: 'Only build & push image, skip SSH deploy'
        required: false
        type: boolean
        default: false
      target_hosts:
        description: 'Override target hosts (comma-separated, empty = all from secret)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ghcr_image: ${{ steps.meta.outputs.ghcr_image }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image metadata
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="test-$(echo ${GITHUB_SHA} | cut -c1-7)"
          fi
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT

          OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "ghcr_image=ghcr.io/${OWNER_LOWER}/fluxcode-backend" >> $GITHUB_OUTPUT

          # Read version from VERSION file
          VERSION=$(tr -d '\r\n' < backend/cmd/server/VERSION || echo "unknown")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          echo "Image tag: ${TAG}, Version: ${VERSION}"

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/backend/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ steps.meta.outputs.ghcr_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.ghcr_image }}:test-latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=backend-test
          cache-to: type=gha,mode=max,scope=backend-test

  deploy:
    needs: build-and-push
    if: ${{ github.event.inputs.skip_deploy != 'true' }}
    runs-on: ubuntu-latest
    environment: test-backend
    strategy:
      # Rolling deployment: one server at a time
      max-parallel: 1
      matrix:
        include:
          - index: 0
    env:
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
    steps:
      - name: Deploy to test backend servers (rolling update)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ github.event.inputs.target_hosts || secrets.TEST_BACKEND_DEPLOY_HOSTS }}
          username: ${{ secrets.TEST_BACKEND_DEPLOY_USER || 'root' }}
          password: ${{ secrets.TEST_BACKEND_DEPLOY_PASSWORD }}
          port: ${{ secrets.TEST_BACKEND_DEPLOY_PORT || '22' }}
          envs: GHCR_PAT
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.TEST_BACKEND_DEPLOY_PATH || '/opt/sub2api/backend' }}"
            cd "$DEPLOY_PATH"

            echo "==> [Test] Host: $(hostname) ($(hostname -I | awk '{print $1}'))"

            # Login to GHCR (using PAT passed via environment)
            if [ -n "$GHCR_PAT" ]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            fi

            echo "==> Updating .env: BACKEND_TAG=${{ needs.build-and-push.outputs.image_tag }}"
            sed -i 's|^BACKEND_TAG=.*|BACKEND_TAG=${{ needs.build-and-push.outputs.image_tag }}|' .env

            echo "==> Pulling image: ${{ needs.build-and-push.outputs.ghcr_image }}:${{ needs.build-and-push.outputs.image_tag }}"
            docker compose pull backend

            echo "==> Restarting backend service..."
            docker compose up -d --remove-orphans backend

            echo "==> Waiting for backend to be healthy..."
            RETRIES=0
            MAX_RETRIES=30
            while [ $RETRIES -lt $MAX_RETRIES ]; do
              if docker compose ps backend | grep -q "healthy"; then
                echo "✅ Backend is healthy on $(hostname)!"
                break
              fi
              RETRIES=$((RETRIES + 1))
              if [ $RETRIES -ge $MAX_RETRIES ]; then
                echo "❌ Backend health check timed out on $(hostname)"
                docker compose logs --tail=30 backend
                exit 1
              fi
              echo "  Waiting for health check... ($RETRIES/$MAX_RETRIES)"
              sleep 10
            done

            echo "==> Cleaning up old images..."
            docker image prune -f --filter "until=168h"

      - name: Deployment summary
        run: |
          echo "## Test Backend Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: test" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ needs.build-and-push.outputs.ghcr_image }}:${{ needs.build-and-push.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ needs.build-and-push.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Hosts**: \`${{ github.event.inputs.target_hosts || secrets.TEST_BACKEND_DEPLOY_HOSTS }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${GITHUB_SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
